<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Civ Modding Central</title>
  <desc id="desc">Interactive map viewer for Civilization community maps.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1a26"/>
      <stop offset="1" stop-color="#132537"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="52" y="52" width="1096" height="526" rx="28" fill="#0f1f2f" stroke="#2b4257" stroke-width="2"/>

  <g transform="translate(98 95)">
    <rect width="340" height="340" rx="28" fill="#f24806"/>
    <g transform="translate(170 124)" fill="none" stroke="#fff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
      <circle r="86"/>
      <ellipse rx="64" ry="86"/>
      <ellipse rx="28" ry="86"/>
      <path d="M-86 0h172"/>
      <path d="M-74 -29c31 18 126 18 148 0"/>
      <path d="M-74 29c31-18 126-18 148 0"/>
    </g>
    <text x="170" y="300" text-anchor="middle" fill="#fff" font-size="106" font-family="Georgia, 'Times New Roman', serif" font-weight="700">CMC</text>
  </g>

  <text x="484" y="216" fill="#ffffff" font-size="72" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-weight="700">Civ Modding Central</text>
  <text x="484" y="284" fill="#d5dfeb" font-size="34" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif">Interactive Civilization map atlas</text>

  <g fill="#9cb6cd" font-size="24" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif">
    <text x="484" y="356">Inspect tiles • Track civilizations • Collaborate on map notes</text>
    <text x="484" y="402">Community map data + live civilization pin overlays</text>
    <text x="484" y="514" fill="#f2f6fa">civmoddingcentral.com</text>
  </g>
</svg>
